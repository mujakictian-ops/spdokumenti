<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prijava – spDokumenti</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f0f5ff;--white:#fff;--border:#e0e8ff;--blue:#3d7eff;--text:#1a1a1a;--muted:#6b7280;--green:#2e7d32;--red:#e85c47;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}html{color-scheme:light;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg)!important;color:var(--text)!important;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 20px rgba(61,126,255,.08);}
.logo{font-weight:700;font-size:1.2rem;color:var(--text);text-decoration:none;display:block;text-align:center;margin-bottom:2rem;}
.logo span{color:var(--blue);}
h1{font-size:1.4rem;font-weight:700;margin-bottom:.5rem;text-align:center;}
.subtitle{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:2rem;}
.tabs{display:flex;background:var(--bg);border-radius:8px;padding:4px;margin-bottom:1.5rem;}
.tab{flex:1;padding:.6rem;text-align:center;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .2s;}
.tab.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.field{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem;}
label{font-size:.75rem;font-weight:600;color:var(--muted);}
input{border:1.5px solid var(--border);background:var(--bg);padding:.7rem 1rem;font-family:inherit;font-size:.9rem;color:var(--text);border-radius:8px;transition:border-color .2s;width:100%;}
input:focus{outline:none;border-color:var(--blue);background:var(--white);}
.btn{width:100%;background:var(--blue);color:white;border:none;padding:.85rem;border-radius:var(--radius);font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:.5rem;}
.btn:hover{opacity:.88;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.divider{display:flex;align-items:center;gap:1rem;margin:1.25rem 0;color:var(--muted);font-size:.8rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.msg{padding:.75rem 1rem;border-radius:8px;font-size:.83rem;margin-bottom:1rem;display:none;}
.msg.error{background:#fff0ee;border:1px solid #ffd0c8;color:var(--red);}
.msg.success{background:#e8f5e9;border:1px solid #a5d6a7;color:var(--green);}
.back{display:block;text-align:center;margin-top:1.25rem;font-size:.83rem;color:var(--muted);text-decoration:none;}
.back:hover{color:var(--blue);}
</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo">sp<span>Dokumenti</span></a>
  <h1 id="form-title">Dobrodošli nazaj!</h1>
  <p class="subtitle" id="form-sub">Prijavite se za dostop do Pro dokumentov</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Prijava</button>
    <button class="tab" onclick="switchTab('register')">Registracija</button>
  </div>

  <div id="msg" class="msg"></div>

  <div id="login-form">
    <div class="field">
      <label>E-mail naslov</label>
      <input type="email" id="login-email" placeholder="vas@email.si">
    </div>
    <div class="field">
      <label>Geslo</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn" onclick="login()" id="login-btn">Prijavi se →</button>
  </div>

  <div id="register-form" style="display:none">
    <div class="field">
      <label>E-mail naslov</label>
      <input type="email" id="reg-email" placeholder="vas@email.si">
    </div>
    <div class="field">
      <label>Geslo (min. 6 znakov)</label>
      <input type="password" id="reg-password" placeholder="••••••••">
    </div>
    <div class="field">
      <label>Potrdi geslo</label>
      <input type="password" id="reg-password2" placeholder="••••••••">
    </div>
    <button class="btn" onclick="register()" id="reg-btn">Ustvari račun →</button>
  </div>

  <a href="index.html" class="back">← Nazaj na glavno stran</a>
  <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid #e0e8ff;text-align:center">
    <a href="https://billing.stripe.com/p/login/3cI7sLa0Hervb2ja4I3VC00" style="font-size:.8rem;color:#6b7280;text-decoration:none">Upravljaj naročnino / Preklic →</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jgogoroloaykrmtnyxgh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_CxbeAKCs1dFKAmqOc6uCwA_NrZuq-rP';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('form-title').textContent = tab === 'login' ? 'Dobrodošli nazaj!' : 'Ustvarite račun';
  document.getElementById('form-sub').textContent = tab === 'login' ? 'Prijavite se za dostop do Pro dokumentov' : 'Brezplačno – plačate samo za Pro plan';
  hideMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

function hideMsg() {
  document.getElementById('msg').style.display = 'none';
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showMsg('Izpolnite vse podatke.', 'error'); return; }
  
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Prijavljam...';
  
  const { error } = await _sb.auth.signInWithPassword({ email, password });
  
  if (error) {
    showMsg('Napačen email ali geslo.', 'error');
    btn.disabled = false; btn.textContent = 'Prijavi se →';
  } else {
    showMsg('Uspešna prijava! Preusmerjam...', 'success');
    setTimeout(() => {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      if (redirect) {
        window.location.href = redirect;
      } else {
        window.location.href = 'index.html';
      }
    }, 1000);
  }
}

async function register() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;
  
  if (!email || !password) { showMsg('Izpolnite vse podatke.', 'error'); return; }
  if (password !== password2) { showMsg('Gesli se ne ujemata.', 'error'); return; }
  if (password.length < 6) { showMsg('Geslo mora imeti vsaj 6 znakov.', 'error'); return; }
  
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Ustvarjam račun...';
  
  const { error } = await _sb.auth.signUp({ email, password });
  
  if (error) {
    showMsg('Napaka: ' + error.message, 'error');
    btn.disabled = false; btn.textContent = 'Ustvari račun →';
  } else {
    showMsg('✓ Račun ustvarjen! Preverite email za potrditev.', 'success');
    btn.disabled = false; btn.textContent = 'Ustvari račun →';
  }
}

// Check if already logged in
_sb.auth.getSession().then(({ data: { session } }) => {
  if (session) {
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect');
    if (redirect) {
      window.location.href = redirect;
    } else {
      window.location.href = 'index.html';
    }
  }
});
</script>
</body>
</html>
