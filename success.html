<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hvala za naročilo – spDokumenti</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{color-scheme:light;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f5ff!important;color:#1a1a1a!important;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:#fff;border:1.5px solid #e0e8ff;border-radius:16px;padding:3rem 2.5rem;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 20px rgba(61,126,255,.08);}
.icon{font-size:4rem;margin-bottom:1.5rem;}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.75rem;color:#1a1a1a;}
p{color:#6b7280;font-size:.95rem;line-height:1.7;margin-bottom:2rem;}
.btn{display:block;background:#3d7eff;color:white;padding:.9rem 2rem;border-radius:10px;text-decoration:none;font-weight:700;font-size:1rem;margin-bottom:.75rem;transition:opacity .2s;}
.btn:hover{opacity:.88;}
.btn-outline{display:block;background:transparent;color:#3d7eff;padding:.9rem 2rem;border-radius:10px;text-decoration:none;font-weight:600;font-size:.9rem;border:1.5px solid #3d7eff;transition:opacity .2s;}
.btn-outline:hover{opacity:.75;}
.features{background:#f0f5ff;border-radius:10px;padding:1.25rem;margin-bottom:2rem;text-align:left;}
.features p{color:#1a1a1a;margin-bottom:0;font-size:.88rem;}
.feature{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;font-size:.88rem;color:#1a1a1a;}
.feature:last-child{margin-bottom:0;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>Dobrodošli v Pro planu!</h1>
  <p>Vaše plačilo je bilo uspešno. Zdaj imate dostop do vseh dokumentov na spDokumenti.si!</p>
  
  <div class="features">
    <div class="feature">✅ Neomejene fakture</div>
    <div class="feature">✅ Pogodba o delu</div>
    <div class="feature">✅ Avtorska pogodba</div>
    <div class="feature">✅ Ponudba / Predračun</div>
    <div class="feature">✅ Najemna pogodba</div>
    <div class="feature">✅ Potni nalog</div>
    <div class="feature">✅ NDA in Izjava o delu</div>
  </div>

  <a href="index.html" class="btn">Začni uporabljati →</a>
  <a href="https://billing.stripe.com/p/login/3cI7sLa0Hervb2ja4I3VC00" class="btn-outline">Upravljaj naročnino</a>
</div>
</body>
</html>
